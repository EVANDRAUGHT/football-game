<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="fieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc70;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0" />
    </radialGradient>
    
    <!-- 滤镜效果 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 动画定义 -->
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      
      @keyframes orbit {
        from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
        to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
      }
      
      @keyframes dataFlow {
        0% { stroke-dashoffset: 0; opacity: 0.3; }
        50% { opacity: 0.8; }
        100% { stroke-dashoffset: -200; opacity: 0.3; }
      }
      
      @keyframes brainPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      
      .football-spin {
        animation: spin 20s linear infinite;
        transform-origin: center;
      }
      
      .glow-pulse {
        animation: pulse 3s ease-in-out infinite;
      }
      
      .data-orbit {
        animation: orbit 8s linear infinite;
      }
      
      .data-flow {
        animation: dataFlow 3s linear infinite;
      }
      
      .brain-pulse {
        animation: brainPulse 2s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- 背景光晕 -->
  <circle cx="100" cy="100" r="80" fill="url(#glowGradient)" opacity="0.3" class="glow-pulse"/>
  
  <!-- 外层数据轨道（绿茵场边线） -->
  <g class="data-orbit">
    <circle cx="100" cy="100" r="70" fill="none" stroke="url(#fieldGradient)" stroke-width="2" opacity="0.4" stroke-dasharray="5 5" class="data-flow"/>
  </g>
  
  <!-- 足球主体 -->
  <g class="football-spin">
    <!-- 足球底座 -->
    <circle cx="100" cy="100" r="45" fill="url(#ballGradient)" filter="url(#glow)"/>
    
    <!-- 足球五边形花纹（经典设计） -->
    <g fill="#1a1a2e" opacity="0.8">
      <!-- 中心五边形 -->
      <path d="M 100,60 L 114,74 L 107,92 L 93,92 L 86,74 Z"/>
      
      <!-- 周围六边形（部分可见） -->
      <path d="M 114,74 L 128,70 L 135,85 L 130,98 L 115,98 L 107,92 Z" opacity="0.6"/>
      <path d="M 86,74 L 72,70 L 65,85 L 70,98 L 85,98 L 93,92 Z" opacity="0.6"/>
      <path d="M 107,92 L 115,98 L 115,112 L 100,120 L 85,112 L 85,98 Z" opacity="0.7"/>
    </g>
    
    <!-- 足球高光 -->
    <ellipse cx="90" cy="75" rx="12" ry="8" fill="white" opacity="0.4"/>
    <ellipse cx="85" cy="70" rx="6" ry="4" fill="white" opacity="0.6"/>
  </g>
  
  <!-- AI神经网络节点（环绕足球） -->
  <g class="brain-pulse">
    <!-- 顶部节点 -->
    <circle cx="100" cy="40" r="4" fill="#00ff88" opacity="0.8"/>
    <line x1="100" y1="40" x2="100" y2="55" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
    
    <!-- 右上节点 -->
    <circle cx="135" cy="65" r="4" fill="#00ff88" opacity="0.8"/>
    <line x1="135" y1="65" x2="125" y2="80" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
    
    <!-- 右下节点 -->
    <circle cx="135" cy="125" r="4" fill="#00ff88" opacity="0.8"/>
    <line x1="135" y1="125" x2="125" y2="110" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
    
    <!-- 底部节点 -->
    <circle cx="100" cy="155" r="4" fill="#00ff88" opacity="0.8"/>
    <line x1="100" y1="155" x2="100" y2="145" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
    
    <!-- 左下节点 -->
    <circle cx="65" cy="125" r="4" fill="#00ff88" opacity="0.8"/>
    <line x1="65" y1="125" x2="75" y2="110" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
    
    <!-- 左上节点 -->
    <circle cx="65" cy="65" r="4" fill="#00ff88" opacity="0.8"/>
    <line x1="65" y1="65" x2="75" y2="80" stroke="#00ff88" stroke-width="1.5" opacity="0.4" stroke-dasharray="3 3"/>
  </g>
  
  <!-- 数据流动粒子（球场路径） -->
  <g class="data-flow">
    <circle cx="130" cy="100" r="3" fill="#00ffcc" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite" 
                     path="M 0,0 Q 30,-30 60,0 T 120,0" />
    </circle>
    
    <circle cx="70" cy="100" r="3" fill="#00ff88" opacity="0.8">
      <animateMotion dur="5s" repeatCount="indefinite" begin="1s"
                     path="M 0,0 Q -30,30 -60,0 T -120,0" />
    </circle>
    
    <circle cx="100" cy="70" r="3" fill="#00ddaa" opacity="0.8">
      <animateMotion dur="4.5s" repeatCount="indefinite" begin="0.5s"
                     path="M 0,0 Q 0,-30 0,-60 T 0,-120" />
    </circle>
  </g>
  
  <!-- 内层科技圆环（球场中心圈） -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#fieldGradient)" stroke-width="1" opacity="0.3" class="glow-pulse"/>
  
  <!-- Goal进球标识（顶部装饰） -->
  <g opacity="0.6">
    <rect x="90" y="25" width="20" height="8" rx="4" fill="none" stroke="#00ff88" stroke-width="1.5"/>
    <line x1="95" y1="29" x2="105" y2="29" stroke="#00ff88" stroke-width="1.5"/>
  </g>
</svg>