<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <link rel="icon" href="logo-football.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {

            --cyan: #00d4ff;
            --accent: #ff6b6b;
            --bg-dark: #060d1a;
            --card-bg: rgba(10, 20, 40, 0.85);

            --text-dim: rgba(180, 210, 255, 0.55);

        body {
            font-family: 'Segoe UI', 'PingFang SC', sans-serif;

        }

        #particle-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        /* ========== 布局 ========== */
        .chat-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        /* ========== 侧边栏 ========== */
        .sidebar {
            width: var(--sidebar-w);
            background: linear-gradient(180deg, rgba(6,13,26,0.97) 0%, rgba(8,18,36,0.97) 100%);
            border-right: 1px solid rgba(0,212,255,0.12);
            display: flex;
            flex-direction: column;
            padding: 0;
            flex-shrink: 0;
            position: relative;
        }
        .sidebar::after {
            content: '';
            position: absolute;
        /* ========== 主区域 ========== */
            top: 0; right: 0; bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(0,212,255,0.3) 30%, rgba(0,255,136,0.2) 70%, transparent);
        }
        .sidebar-logo {
            padding: 18px 16px 14px;
            border-bottom: 1px solid rgba(0,212,255,0.1);
        /* 顶部工具栏 */
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-logo img {
            width: 32px; height: 32px;
            filter: drop-shadow(0 0 6px rgba(0,255,136,0.5));
        }
        .sidebar-logo-text h2 {
            font-size: 0.95rem;
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        /* 模型选择 */
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .sidebar-logo-text p {
            font-size: 0.6rem;
            color: rgba(0,212,255,0.5);
            letter-spacing: 1px;
            margin-top: 1px;
        }
        .new-session-btn {
            margin: 12px 14px;
            background: linear-gradient(135deg, rgba(0,255,136,0.12), rgba(0,212,255,0.08));
            border: 1px solid rgba(0,255,136,0.3);

            border-radius: 8px;

            justify-content: center;

        }
        .new-session-btn:hover {
            background: linear-gradient(135deg, rgba(0,255,136,0.22), rgba(0,212,255,0.15));

        .session-list {
            flex: 1;

            letter-spacing: 1.5px;
            text-transform: uppercase;

        }
        .session-item {
        /* AI 消息左边装饰 */
            border: 1px solid transparent;
            border-radius: 7px;
            padding: 9px 11px;
            margin-bottom: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .session-item:hover {
            background: rgba(0,212,255,0.07);
            border-color: rgba(0,212,255,0.15);
        }
        .session-item.active {
            background: rgba(0,255,136,0.1);
            border-color: rgba(0,255,136,0.25);
        }
        .session-item-icon {
            color: var(--text-dim);
            font-size: 0.75rem;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .session-item.active .session-item-icon { color: var(--primary); }
        .session-item-info {
            flex: 1;
            min-width: 0;
        }
        .session-item-title {
            font-size: 0.8rem;
            color: rgba(220,235,255,0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .session-item.active .session-item-title { color: #00ff88; }
        .session-item-time {
        /* 预设问题下拉 */
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        /* ========== 主区域 ========== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: transparent;
        }
        /* ========== 顶栏 ========== */
        .chat-header {
            padding: 0 28px;
            height: 58px;
            border-bottom: 1px solid rgba(0,212,255,0.12);
            display: flex;
            justify-content: space-between;
        /* 输入区 */
            align-items: center;
            background: rgba(6,13,26,0.9);
            backdrop-filter: blur(12px);
            flex-shrink: 0;
            position: relative;
        }
        /* 顶部工具栏 */
        .chat-header::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.5), rgba(0,255,136,0.4), transparent);
        }
        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        /* ========== 滚动条 ========== */
            color: var(--cyan);
            font-size: 1.1rem;
        }
        .header-title h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
        }
        /* 闪烁光标 */
        .cursor-blink {
            display: inline-block;
            width: 2px; height: 16px;
            background: var(--cyan);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        /* 模型选择 */
        .model-select-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,212,255,0.07);
            border-radius: 8px;
        }
        .model-select-wrapper i {
            color: var(--cyan);
            font-size: 0.8rem;
        }
        .model-select-wrapper select {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.82rem;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        .model-select-wrapper select option {
            background: #0a1828;
            color: #e8f4ff;
        }
        .metrics {
            display: flex;
            gap: 14px;
            font-size: 0.78rem;
            color: var(--text-dim);
        }
        .metric {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .metric.good { color: var(--primary); border-color: rgba(0,255,136,0.15); }
        .metric.cyan { color: var(--cyan); border-color: rgba(0,212,255,0.15); }
        /* ========== 消息区域 ========== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .message {
            display: flex;
            gap: 12px;
            animation: msgIn 0.28s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .message.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
            position: relative;
        }
        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 0 12px rgba(102,126,234,0.4);
        }
        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #0a2a18, #0d3a28);
            border: 1.5px solid rgba(0,255,136,0.35);
            color: var(--primary);
            box-shadow: 0 0 12px rgba(0,255,136,0.15);
        }
        /* AI 头像光圈 */
        .message.assistant .message-avatar::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid rgba(0,255,136,0.2);
            animation: avatarPulse 2.5s ease-in-out infinite;
        }
            50%{opacity:1;transform:scale(1.06)}
        }
        .message-bubble {
            max-width: 72%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .message-sender {
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message.user .message-sender { justify-content: flex-end; }
        .message-sender .sender-name { color: rgba(200,220,255,0.7); font-weight: 600; }
        .message-content {
            background: rgba(12,25,48,0.9);
            padding: 13px 18px;
            border-radius: 4px 14px 14px 14px;
            border: 1px solid rgba(0,212,255,0.12);
            line-height: 1.65;
            font-size: 0.9rem;
            color: rgba(220,235,255,0.9);
            position: relative;
        }
        .message.user .message-content {
            background: rgba(60,40,120,0.5);
            border-color: rgba(102,126,234,0.25);
            border-radius: 14px 4px 14px 14px;
            color: rgba(230,225,255,0.92);
        }
        /* AI 消息左边装饰 */
        .message.assistant .message-content::before {
            content: '';
            position: absolute;
            left: 0; top: 10px; bottom: 10px;
            width: 2px;
            background: linear-gradient(180deg, var(--primary), var(--cyan));
            border-radius: 2px;
        }
        .message-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .message.user .message-meta { justify-content: flex-end; }
                        session_id: generateSessionId(), // 每 session 强制不走缓存
        .message-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        /* 重新生成按钮 */
            padding: 0 4px;
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 2px;
        }
        .regen-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: rgba(0,212,255,0.6);
            background: transparent;
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .regen-btn:hover {
            color: var(--cyan);
            background: rgba(0,212,255,0.08);
            border-color: rgba(0,212,255,0.4);
        }
        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 10px 2px;
            align-items: center;
        }
        .typing-indicator span {
            width: 7px; height: 7px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }
        /* ========== 输入区域 ========== */
        .input-container {
            background: rgba(6,13,26,0.95);
            border-top: 1px solid rgba(0,212,255,0.12);
            padding: 14px 28px 18px;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
            position: relative;
        }
        /* 输入区顶部扫描线 */
        .input-container::before {
            content: '';
            position: absolute;
            top: -1px; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), rgba(0,255,136,0.3), transparent);
        }
        .input-top-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        /* 视频选择 */
        .video-selector-wrap {
            flex: 1;
            position: relative;
        }
        .video-selector-wrap select {
            width: 100%;
            background: rgba(0,212,255,0.05);
            border: 1px solid rgba(0,212,255,0.2);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.83rem;
            cursor: pointer;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
            appearance: none;
        }
        .video-selector-wrap select.not-selected {
            border-color: rgba(255,159,64,0.4);
            color: rgba(255,180,80,0.8);
        }
        .video-selector-wrap select.selected {
            border-color: rgba(0,255,136,0.35);
            background: rgba(0,255,136,0.05);
        }
        .video-selector-wrap select:hover { border-color: rgba(0,212,255,0.5); }
        .video-selector-wrap select option {
            background: #0a1828;
            color: #e8f4ff;
        }
        /* 预设问题下拉 */
        .preset-select-wrap {
            position: relative;
        }
        .preset-select-wrap select {
            background: rgba(0,255,136,0.06);
            border: 1px solid rgba(0,255,136,0.25);
            color: var(--primary);
            padding: 8px 34px 8px 12px;
            border-radius: 8px;
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
            appearance: none;
            white-space: nowrap;
            min-width: 160px;
        }
        .preset-select-wrap select:hover {
            border-color: rgba(0,255,136,0.5);
            background: rgba(0,255,136,0.1);
        }
        .preset-select-wrap select option {
            background: #071020;
            color: #e8f4ff;
        }
        .preset-select-wrap::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            pointer-events: none;
            font-size: 0.75rem;
        }
        .refresh-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-dim);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .refresh-btn:hover {
            background: rgba(0,212,255,0.08);
            border-color: rgba(0,212,255,0.3);
            color: var(--cyan);
        }
        /* 输入区 */
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-row textarea {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(0,212,255,0.18);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 10px;
            resize: none;
            font-size: 0.92rem;
            font-family: inherit;
            min-height: 52px;
            max-height: 140px;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-row textarea:focus {
            outline: none;
            border-color: rgba(0,212,255,0.45);
            box-shadow: 0 0 0 2px rgba(0,212,255,0.08);
        }
        .input-row textarea::placeholder {
            color: rgba(130,160,200,0.4);
        }
        .send-btn {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border: none;
            border-radius: 10px;
            color: #060d1a;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,212,255,0.35);
        }
        .send-btn:disabled {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .input-hint {
            font-size: 0.68rem;
            color: rgba(130,160,200,0.35);
            margin-top: 6px;
            text-align: right;
        }
        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,255,0.4); }
        /* ========== 角标装饰 ========== */
        .corner-tl, .corner-br {
            position: absolute;
            width: 12px; height: 12px;
        }
        .corner-tl {
            top: 8px; left: 8px;
            border-top: 2px solid rgba(0,212,255,0.5);
            border-left: 2px solid rgba(0,212,255,0.5);
        }
        .corner-br {
            bottom: 8px; right: 8px;
            border-bottom: 2px solid rgba(0,212,255,0.5);
            border-right: 2px solid rgba(0,212,255,0.5);
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <div class="chat-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <img src="logo-football.svg" alt="logo">
                <div class="sidebar-logo-text">
                    <h2>GoalScope球界</h2>
                    <p>AI FOOTBALL ANALYTICS</p>
                </div>
            </div>
            <button class="new-session-btn" onclick="createNewSession()">
                <i class="fas fa-plus"></i> 新建对话
            </button>
            <div class="session-list" id="session-list">

                    <span class="terminal-icon"><i class="fas fa-terminal"></i></span>
                    <h1>MISSION CONTROL</h1>
                    <span class="cursor-blink"></span>
                </div>
                <div class="header-right">
                    <!-- 模型选择 -->
                    <div class="model-select-wrapper">
                        <i class="fas fa-microchip"></i>
                        <select id="model-select">
                            <option value="football-gpt">FootballGPT Pro</option>
                            <option value="lite">FootballGPT Lite</option>
                        </select>
                        <i class="fas fa-chevron-down" style="color:rgba(0,212,255,0.4);font-size:0.7rem;"></i>
                    </div>
                    <div class="metrics">
                        <div class="metric good">
                            <i class="fas fa-bolt"></i>
                            <span id="metric-speed">0.0s</span>
                        </div>
                        <div class="metric cyan">
                            <i class="fas fa-check-circle"></i>
                            <span id="metric-success">0%</span>
                        </div>
                    </div>
                </div>
                <div class="corner-tl"></div>
                <div class="corner-br"></div>
            </div>
            <!-- 消息列表 -->
            <div class="messages-container" id="messages">

                <div class="message assistant" id="welcome-msg">
                    <div class="message-avatar"><i class="fas fa-robot"></i></div>
                    <div class="message-bubble">
                        <div class="message-sender">

                            <span style="color:rgba(0,255,136,0.4);font-size:0.65rem;">READY</span>
                        </div>
                        <div class="message-content">
                            <p>👋 您好！我是<strong>FootballGPT</strong>，您的专业足球分析AI助手。</p>
                            <p style="margin-top:10px;color:var(--text-dim);">能力范围：</p>
                            <ul style="margin-top:8px;padding-left:18px;color:rgba(180,210,255,0.75);line-height:2;">
                                <li>📊 深度解读球员能力数据与表现</li>
                                <li>⚡ 分析战术布局与团队配合</li>
                                <li>💡 提供个性化训练建议</li>
                                <li>🎯 解答足球相关的专业问题</li>
                            </ul>
                            <p style="margin-top:12px;color:rgba(0,212,255,0.6);font-size:0.85rem;">💡 请先选择已分析的视频，然后开始提问。</p>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 输入区域 -->
            <div class="input-container">
                <div class="input-top-bar">
                    <!-- 视频选择 -->
                    <div class="video-selector-wrap">
                        <select id="video-select" class="not-selected">
                            <option value="">请先上传并分析视频...</option>
                        </select>
                    </div>
                    <!-- 预设问题下拉 -->
                    <div class="preset-select-wrap">
                        <select id="preset-select" onchange="fillPresetQuestion(this)">
                            <option value="">💡 预设问题</option>
                            <option value="综合分析本场比赛中两队的整体表现，包括进攻效率、防守稳定性和中场控制力，并给出胜负关键因素">📊 全队综合表现分析</option>
                            <option value="找出本场视频中综合能力最突出的球员，说明其核心优势，并推荐其最适合的场上位置">⭐ 最佳球员识别</option>
                            <option value="针对视频中表现相对薄弱的球员，给出具体可执行的个性化训练方案，包括训练重点和周期安排">🏋️ 个性化训练方案</option>
                            <option value="从战术角度分析本场比赛的阵型配合，指出有效的进攻套路和存在的战术漏洞，并提出优化建议">♟️ 战术阵型分析</option>
                            <option value="对本场比赛的控球率、传球成功率、射门次数等关键数据指标进行量化分析和横向对比">📱 关键数据指标对比</option>
                            <option value="分析主客队的防守体系，评估压迫防守效果与防线空间控制能力">🛡️ 防守体系评估</option>
                            <option value="预测基于本场表现，两队下一场比赛应调整的战术策略与阵容选择">🎮 下一场战术预测</option>
                        </select>
                    </div>
                    <!-- 刷新按钮 -->
                    <button class="refresh-btn" onclick="loadVideos()" title="刷新视频列表">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="input-row">
                    <textarea
                        id="user-input"
                        placeholder="输入指令..."
                        onkeydown="handleKeyPress(event)"
                        oninput="autoResize(this)"
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()" title="发送 (Ctrl+Enter)">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-hint">Ctrl+Enter 发送</div>
            </div>
        </div>
    </div>
    <script>
        // ========== 颗粒背景 ==========
        (function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles = [];
            function resize() {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            class Particle {
                constructor() { this.reset(true); }
                reset(init) {
                    this.x = Math.random() * W;
                    this.y = init ? Math.random() * H : H + 5;
                    this.r = Math.random() * 1.2 + 0.3;
                    this.speed = Math.random() * 0.3 + 0.05;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.drift = (Math.random() - 0.5) * 0.15;
                    // 颜色：青色/绿色/白色颗粒
                    const palette = ['rgba(0,212,255,', 'rgba(0,255,136,', 'rgba(180,220,255,'];
                    this.color = palette[Math.floor(Math.random() * palette.length)];
                }
                update() {
                    this.y -= this.speed;
                    this.x += this.drift;
                    if (this.y < -5) this.reset(false);
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + this.opacity + ')';
                    ctx.fill();
                }
            }
            function init() {
                resize();
                particles = Array.from({ length: 120 }, () => new Particle());
            }
            function loop() {
                ctx.clearRect(0, 0, W, H);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(loop);
            }
            window.addEventListener('resize', () => {
                resize();
                particles = Array.from({ length: 120 }, () => new Particle());
            });
            init();
            loop();
        })();
        // ========== 全局配置 ==========
        const API_BASE = 'http://127.0.0.1:9999';
        let currentSessionId = generateSessionId();
        let currentVideoId = null;
        let isWaitingResponse = false;
        let sessionHistory = [];  // [{id, title, time}]
        let lastAssistantMsgId = null;  // 用于重新生成
        let lastUserMessage = null;
        // ========== 粒子动画已在顶部 IIFE 中初始化 ==========
        // ========== 缓存同步 ==========
        async function syncAICache() {
            try {
                const response = await fetch(`${API_BASE}/ai/cache/sync`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    const result = await response.json();
                    console.log('[CACHE_SYNC]', result);
                    return result;
                }
            } catch (e) { console.error('[CACHE_SYNC]', e); }
            return null;
        }
        async function fetchGhostStats() {
            try {
                const res = await fetch(`${API_BASE}/ai/ghosts/stats`);
                if (!res.ok) return null;
                return await res.json();
            } catch (e) { return null; }
        }
        async function cleanGhostData(purge = false) {
            const stats = await fetchGhostStats();
            const total = stats ? (stats.total_ghosts || 0) : 0;
            if (total === 0) return;
            if (!purge) {
                const doDelete = confirm(`发现 ${total} 条幽灵数据，确定永久删除？`);
                purge = doDelete;
            }
            try {
                const res = await fetch(`${API_BASE}/ai/ghosts/clean?purge=${purge}`, { method: 'POST' });
                const result = await res.json();
                console.log('[GHOST_CLEAN]', result);
                if ((result.total_removed || 0) > 0) setTimeout(loadVideos, 800);
            } catch (err) { console.error('[GHOST_CLEAN]', err); }
        }
        // ========== 初始化 ==========
        window.onload = async () => {
            document.getElementById('video-select').className = 'not-selected';
            await syncAICache();
            await loadVideos();
            const urlParams = new URLSearchParams(window.location.search);
            const preselectedVid = urlParams.get('vid');
            if (preselectedVid) {
                const sel = document.getElementById('video-select');
                sel.value = preselectedVid;
                if (sel.value !== preselectedVid) {
                    await loadVideos(true);
                    sel.value = preselectedVid;
                }
                if (sel.value === preselectedVid) {
                    sel.className = 'selected';
                    currentVideoId = preselectedVid;
                    await analyzeVideoForAI(preselectedVid);
                }
            }
            await loadMetrics();
            setInterval(loadMetrics, 5000);
            setInterval(syncAICache, 5 * 60 * 1000);
        };
        // ========== 会话管理 ==========
        function generateSessionId() {
            return `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }
        function createNewSession() {
            currentSessionId = generateSessionId();
            lastAssistantMsgId = null;
            lastUserMessage = null;
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';
            addMessage('assistant', '💬 新对话已创建，请继续提问！', {});
            // 记录到侧边栏
            const newEntry = { id: currentSessionId, title: '新建对话', time: new Date() };
            sessionHistory.unshift(newEntry);
            renderSessionList();
        }
        function renderSessionList() {
            const container = document.getElementById('session-list');
            let html = '<div class="session-list-title">历史对话</div>';
            if (sessionHistory.length === 0) {
                html += `<div style="font-size:0.75rem;color:var(--text-dim);padding:12px 4px;">暂无历史对话</div>`;
            } else {
                sessionHistory.forEach(s => {
                    const isActive = s.id === currentSessionId;
                    const timeStr = formatTime(s.time);
                    html += `
                        <div class="session-item ${isActive ? 'active' : ''}" onclick="switchSession('${s.id}')">
                            <div class="session-item-icon"><i class="fas fa-comment-dots"></i></div>
                            <div class="session-item-info">
                                <div class="session-item-title">${escHtml(s.title)}</div>
                                <div class="session-item-time">${timeStr}</div>
                            </div>
                        </div>`;
                });
            }
            container.innerHTML = html;
        }
        function switchSession(id) {
            const s = sessionHistory.find(x => x.id === id);
            if (!s) return;
            currentSessionId = id;
            renderSessionList();
            // 实际场景可从后端加载历史消息，此处仅切换会话ID
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';
            addMessage('assistant', `📂 已切换到对话：${s.title}`, {});
        }
        function formatTime(date) {
            if (!(date instanceof Date)) date = new Date(date);
            const M = date.getMonth() + 1, D = date.getDate();
            const h = date.getHours(), m = String(date.getMinutes()).padStart(2, '0');
            return `${M}/${D} ${h}:${m}`;
        }
        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }
        // ========== 视频加载 ==========
        async function loadVideos(ignoreOwner = false) {
            try {
                const select = document.getElementById('video-select');
                select.innerHTML = '<option value="">正在加载视频列表...</option>';
                select.className = 'not-selected';
                const authRaw = localStorage.getItem('auth_user');
                const authUser = authRaw ? JSON.parse(authRaw) : null;
                const ownerParam = (!ignoreOwner && authUser) ? `&owner=${encodeURIComponent(authUser.username)}` : '';
                const timestamp = Date.now();
                const response = await fetch(`${API_BASE}/api/videos?_t=${timestamp}${ownerParam}`, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' }
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                select.innerHTML = '<option value="">💡 请选择视频开始分析...</option>';
                select.className = 'not-selected';
                if (data.status === 'success' && data.videos && data.videos.length > 0) {
                    data.videos.forEach(video => {
                        const option = document.createElement('option');
                        option.value = video.id;
                        let displayName = video.name;
                        if (video.analyzed_at) {
                            const date = new Date(video.analyzed_at);
                            const y = date.getFullYear();
                            const mo = String(date.getMonth()+1).padStart(2,'0');
                            const d = String(date.getDate()).padStart(2,'0');
                            const h = String(date.getHours()).padStart(2,'0');
                            const mi = String(date.getMinutes()).padStart(2,'0');
                            const s = String(date.getSeconds()).padStart(2,'0');
                            displayName = `${y}-${mo}-${d} ${h}:${mi}:${s}`;
                            if (video.name && !video.name.startsWith('视频_')) {
                                displayName += ` (${video.name})`;
                            }
                        }
                        option.textContent = displayName;
                        select.appendChild(option);
                    });
                } else {
                    select.innerHTML = '<option value="">暂无已分析的视频</option>';
                }
                select.onchange = async (e) => {
                    currentVideoId = e.target.value;
                    if (currentVideoId) {
                        select.className = 'selected';
                        await analyzeVideoForAI(currentVideoId);
                    } else {
                        select.className = 'not-selected';
                    }
                };
            } catch (error) {
                console.error('[ERROR] 加载视频失败:', error);
                const select = document.getElementById('video-select');
                select.innerHTML = '<option value="">⚠️ 加载失败，请刷新</option>';
                select.className = 'not-selected';
            }
        }
        async function analyzeVideoForAI(videoId) {
            try {
                const response = await fetch(`${API_BASE}/ai/analyze-video?video_id=${videoId}`, { method: 'POST' });
                if (response.ok) {
                    const data = await response.json();
                    const playerCount = data.semantic_info?.players?.length || 0;
                    addMessage('assistant', `✅ 已加载视频分析数据，识别到 **${playerCount}** 名球员。现在可以开始提问了！`, {});
                } else {
                    addMessage('assistant', '⚠️ 视频数据加载失败，但您仍可以提问通用问题。', {});
                }
            } catch (error) {
                addMessage('assistant', '⚠️ 视频数据加载失败，但您仍可以提问通用问题。', {});
            }
        }
        // ========== 预设问题：填入输入框而非直接发送 ==========
        function fillPresetQuestion(selectEl) {
            const val = selectEl.value;
            if (!val) return;
            const input = document.getElementById('user-input');
            input.value = val;
            autoResize(input);
            input.focus();
            // 重置下拉框到默认项，避免再次触发 onchange
            setTimeout(() => { selectEl.value = ''; }, 50);
        }
        // ========== 消息发送 ==========
        async function sendMessage(overrideMsg) {
            const input = document.getElementById('user-input');
            const message = overrideMsg || input.value.trim();
            if (!message || isWaitingResponse) return;
            if (!currentVideoId) {
                alert('请先选择一个视频！');
                return;
            }
            lastUserMessage = message;
            if (!overrideMsg) input.value = '';
            autoResize(input);
            addMessage('user', message, {});
            isWaitingResponse = true;
            document.getElementById('send-btn').disabled = true;
            addTypingIndicator();
            try {
                const response = await fetch(`${API_BASE}/ai/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSessionId,
                        video_id: currentVideoId,
                        stream: false
                    })
                });
                removeTypingIndicator();
                if (response.ok) {
                    const data = await response.json();
                    lastAssistantMsgId = addMessage('assistant', data.answer, {
                        response_time: data.response_time,
                        tokens: data.tokens_used,
                        confidence: data.confidence,
                        from_cache: data.from_cache
                    }, true);
                    // 更新会话标题（取前5字）
                    updateSessionTitle(message.slice(0, 18));
                } else {
                    const error = await response.json();
                    addMessage('assistant', `❌ 错误: ${error.detail}`, {}, false);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `❌ 网络错误: ${error.message}`, {}, false);
            } finally {
                isWaitingResponse = false;
                document.getElementById('send-btn').disabled = false;
            }
        }
        function updateSessionTitle(title) {
            const s = sessionHistory.find(x => x.id === currentSessionId);
            if (s && s.title === '新建对话') {
                s.title = title;
                renderSessionList();
            } else if (!s) {
                sessionHistory.unshift({ id: currentSessionId, title: title, time: new Date() });
                renderSessionList();
            }
        }
        function handleKeyPress(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
        }
        // ========== 消息显示 ==========
        let msgIdCounter = 0;
        function addMessage(role, content, meta = {}, showRegen = false) {
            const container = document.getElementById('messages');
            const msgId = `msg-${++msgIdCounter}`;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.id = msgId;
            // 头像
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user'
                ? '<i class="fas fa-user"></i>'
                : '<i class="fas fa-robot"></i>';
            // 气泡容器
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            // 发送者信息
            const senderDiv = document.createElement('div');
            senderDiv.className = 'message-sender';
            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            if (role === 'user') {
                senderDiv.innerHTML = `<span style="color:var(--text-dim);">${timeStr}</span><span class="sender-name">你</span>`;
            } else {
                senderDiv.innerHTML = `<span class="sender-name">FootballGPT</span><span style="color:rgba(0,255,136,0.4);font-size:0.65rem;">${timeStr}</span>`;
            }
            // 内容
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            const formatted = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            contentDiv.innerHTML = formatted;
            // 元信息
            if (Object.keys(meta).length > 0) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                if (meta.response_time) metaDiv.innerHTML += `<span><i class="fas fa-clock"></i> ${meta.response_time}s</span>`;
                if (meta.tokens) metaDiv.innerHTML += `<span><i class="fas fa-coins"></i> ${meta.tokens} tokens</span>`;
                if (meta.confidence) metaDiv.innerHTML += `<span><i class="fas fa-check-circle"></i> ${(meta.confidence * 100).toFixed(0)}%</span>`;
                if (meta.from_cache) metaDiv.innerHTML += `<span><i class="fas fa-database"></i> 缓存</span>`;
                contentDiv.appendChild(metaDiv);
            }
            bubble.appendChild(senderDiv);
            bubble.appendChild(contentDiv);
            // 重新生成按钮（仅 assistant 且 showRegen=true）
            if (role === 'assistant' && showRegen) {
                const regenRow = document.createElement('div');
                regenRow.className = 'regen-row';
                const regenBtn = document.createElement('button');
                regenBtn.className = 'regen-btn';
                regenBtn.innerHTML = '<i class="fas fa-redo-alt"></i> 重新生成';
                regenBtn.onclick = () => regenerateLastAnswer(msgId);
                regenRow.appendChild(regenBtn);
                bubble.appendChild(regenRow);
            }
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            return msgId;
        }
        async function regenerateLastAnswer(oldMsgId) {
            if (!lastUserMessage || isWaitingResponse) return;
            // 移除旧的 assistant 消息
            const oldMsg = document.getElementById(oldMsgId);
            if (oldMsg) oldMsg.remove();
            isWaitingResponse = true;
            document.getElementById('send-btn').disabled = true;
            addTypingIndicator();
            try {
                const response = await fetch(`${API_BASE}/ai/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: lastUserMessage,
                        session_id: generateSessionId(), // 每 session 强制不走缓存
                        video_id: currentVideoId,
                        stream: false
                    })
                });
                removeTypingIndicator();
                if (response.ok) {
                    const data = await response.json();
                    lastAssistantMsgId = addMessage('assistant', data.answer, {
                        response_time: data.response_time,
                        tokens: data.tokens_used,
                        confidence: data.confidence,
                        from_cache: data.from_cache
                    }, true);
                } else {
                    const err = await response.json();
                    addMessage('assistant', `❌ 重新生成失败: ${err.detail}`, {}, false);
                }
            } catch (e) {
                removeTypingIndicator();
                addMessage('assistant', `❌ 网络错误: ${e.message}`, {}, false);
            } finally {
                isWaitingResponse = false;
                document.getElementById('send-btn').disabled = false;
            }
        }
        function addTypingIndicator() {
            const container = document.getElementById('messages');
            const ind = document.createElement('div');
            ind.className = 'message assistant';
            ind.id = 'typing-indicator';
            ind.innerHTML = `
                <div class="message-avatar"><i class="fas fa-robot"></i></div>
                <div class="message-bubble">
                    <div class="message-sender"><span class="sender-name">FootballGPT</span></div>
                    <div class="message-content">
                        <div class="typing-indicator"><span></span><span></span><span></span></div>
                    </div>
                </div>`;
            container.appendChild(ind);
            container.scrollTop = container.scrollHeight;
        }
        function removeTypingIndicator() {
            const ind = document.getElementById('typing-indicator');
            if (ind) ind.remove();
        }
        // ========== 性能指标 ==========
        async function loadMetrics() {
            try {
                const response = await fetch(`${API_BASE}/ai/metrics`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'operational') {
                        const m = data.metrics;
                        document.getElementById('metric-speed').textContent = `${m.avg_response_time.toFixed(2)}s`;
                        document.getElementById('metric-success').textContent = `${(m.success_rate * 100).toFixed(0)}%`;
                    }
                }
            } catch (e) { /* silent */ }
        }
        // ========== 初始渲染侧边栏 ==========
        renderSessionList();
    </script>
</body>
