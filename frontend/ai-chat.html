<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 - 足球智能视频分析系统</title>
    <link rel="icon" href="logo-football.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00ff88;
            --secondary: #1a1a2e;
            --accent: #ff6b6b;
            --bg-dark: #0f0f1e;
            --card-bg: rgba(26, 26, 46, 0.8);
            --text-primary: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border: rgba(0, 255, 136, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 侧边栏 */
        .sidebar {
            width: 300px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            margin-bottom: 30px;
        }

        .sidebar-header h2 {
            color: var(--primary);
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .session-list {
            flex: 1;
            overflow-y: auto;
        }

        .session-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .session-item:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--primary);
        }

        .session-item.active {
            background: rgba(0, 255, 136, 0.15);
            border-color: var(--primary);
        }

        .new-session-btn {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .new-session-btn:hover {
            transform: translateY(-2px);
        }

        /* 主聊天区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .chat-header {
            background: var(--card-bg);
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metrics {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .metric.good {
            color: var(--primary);
        }

        .metric.warning {
            color: #ffce56;
        }

        /* 消息区域 */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, var(--primary) 0%, #00cc70 100%);
            color: var(--bg-dark);
        }

        .message-content {
            max-width: 70%;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            line-height: 1.6;
        }

        .message.user .message-content {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 8px;
            display: flex;
            gap: 12px;
        }

        /* 输入区域 */
        .input-container {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 20px 30px;
        }

        .video-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .video-selector select {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        /* 未选中状态 - 使用对比色突出显示 */
        .video-selector select.not-selected {
            background: rgba(255, 159, 64, 0.15);
            border: 1px solid rgba(255, 159, 64, 0.5);
            color: rgba(255, 159, 64, 0.9);
            font-style: italic;
        }

        /* 已选中状态 */
        .video-selector select.selected {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: var(--text-primary);
        }

        .video-selector select:hover {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.2);
        }

        .video-selector select option {
            background: var(--secondary);
            color: var(--text-primary);
            padding: 8px;
        }

        .video-selector select option:first-child {
            color: rgba(255, 159, 64, 0.9);
            font-style: italic;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 15px;
            border-radius: 10px;
            resize: none;
            font-size: 1rem;
            font-family: inherit;
            min-height: 60px;
            max-height: 150px;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .send-btn {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            cursor: not-allowed;
            transform: none;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* 快捷问题 */
        .quick-questions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .quick-question {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 9px 14px;
            border-radius: 10px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
            line-height: 1.35;
            position: relative;
            overflow: hidden;
        }

        .quick-question::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,255,136,0.06) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .quick-question:hover {
            border-color: rgba(0, 255, 136, 0.4);
            background: rgba(0, 255, 136, 0.07);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.1);
        }

        .quick-question:hover::before {
            opacity: 1;
        }

        .quick-question .q-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .quick-question .q-text {
            flex: 1;
        }

        .quick-question .q-text strong {
            display: block;
            color: rgba(255,255,255,0.9);
            font-size: 0.83rem;
            margin-bottom: 1px;
        }

        .quick-question .q-text span {
            color: rgba(255,255,255,0.4);
            font-size: 0.73rem;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <img src="logo-football.svg" alt="GoalScope球界" style="width: 40px; height: 40px; filter: drop-shadow(0 0 8px rgba(0, 255, 136, 0.4));">
                    <div>
                        <h2 style="margin: 0; font-size: 1.3rem; background: linear-gradient(135deg, #00ff88 0%, #00cc70 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700;">GoalScope球界</h2>
                        <p style="margin: 0; font-size: 0.65rem; color: rgba(0, 255, 136, 0.6); letter-spacing: 1.5px;">AI Football Analytics</p>
                    </div>
                </div>
                <button class="new-session-btn" onclick="createNewSession()">
                    <i class="fas fa-plus"></i> 新对话
                </button>
            </div>
            <div class="session-list" id="session-list">
                <!-- 动态加载会话列表 -->
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div class="chat-main">
            <div class="chat-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-robot" style="font-size: 1.5rem; color: var(--primary);"></i>
                    <h1 style="background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">AI 智能分析助手</h1>
                </div>
                <div class="metrics">
                    <div class="metric good">
                        <i class="fas fa-bolt"></i>
                        <span id="metric-speed">0.0s</span>
                    </div>
                    <div class="metric good">
                        <i class="fas fa-check-circle"></i>
                        <span id="metric-success">0%</span>
                    </div>
                    <div class="metric">
                        <i class="fas fa-comments"></i>
                        <span id="metric-sessions">0</span>
                    </div>
                </div>
            </div>

            <div class="messages-container" id="messages">
                <!-- 欢迎消息 -->
                <div class="message assistant">
                    <div class="message-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <p>👋 您好！我是 <strong>FootballGPT</strong>，您的专业足球分析AI助手。</p>
                        <p style="margin-top: 10px;">我能帮助您：</p>
                        <ul style="margin-top: 10px; padding-left: 20px;">
                            <li>📊 深度解读球员能力数据与表现</li>
                            <li>⚽ 分析战术布局与团队配合</li>
                            <li>💡 提供个性化训练建议</li>
                            <li>🎯 解答足球相关的专业问题</li>
                        </ul>
                        <p style="margin-top: 10px; color: var(--text-dim);">请先上传视频并完成分析，然后选择视频开始提问 ⬇️</p>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="video-selector">
                    <select id="video-select">
                        <option value="">请先上传并分析视频...</option>
                    </select>
                    <button onclick="loadVideos()" style="padding: 10px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; cursor: pointer;" title="重新从服务器加载视频列表">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                </div>

                <div class="quick-questions" id="quick-questions-bar">
                    <button class="quick-question" onclick="askQuickQuestion(this, '综合分析本场比赛中两队的整体表现，包括进攻效率、防守稳定性和中场控制力，并给出胜负关键因素')">
                        <div class="q-icon" style="background:rgba(0,255,136,0.12);color:#00ff88;">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                        <div class="q-text">
                            <strong>全队综合表现分析</strong>
                            <span>进攻 · 防守 · 中场控制</span>
                        </div>
                    </button>
                    <button class="quick-question" onclick="askQuickQuestion(this, '找出本场视频中综合能力最突出的球员，说明其核心优势，并推荐其最适合的场上位置')">
                        <div class="q-icon" style="background:rgba(0,212,255,0.12);color:#00d4ff;">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="q-text">
                            <strong>最佳球员识别</strong>
                            <span>综合能力 · 位置推荐</span>
                        </div>
                    </button>
                    <button class="quick-question" onclick="askQuickQuestion(this, '针对视频中表现相对薄弱的球员，给出具体可执行的个性化训练方案，包括训练重点和周期安排')">
                        <div class="q-icon" style="background:rgba(255,206,86,0.12);color:#ffce56;">
                            <i class="fas fa-dumbbell"></i>
                        </div>
                        <div class="q-text">
                            <strong>个性化训练方案</strong>
                            <span>薄弱环节 · 改进建议</span>
                        </div>
                    </button>
                    <button class="quick-question" onclick="askQuickQuestion(this, '从战术角度分析本场比赛的阵型配合，指出有效的进攻套路和存在的战术漏洞，并提出优化建议')">
                        <div class="q-icon" style="background:rgba(255,107,107,0.12);color:#ff6b6b;">
                            <i class="fas fa-chess"></i>
                        </div>
                        <div class="q-text">
                            <strong>战术阵型分析</strong>
                            <span>配合套路 · 优化建议</span>
                        </div>
                    </button>
                </div>

                <div class="input-wrapper">
                    <textarea 
                        id="user-input" 
                        placeholder="输入您的问题...（支持 Ctrl+Enter 发送）"
                        onkeydown="handleKeyPress(event)"
                    ></textarea>
                    <button class="send-btn" id="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i> 发送
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== 全局配置 =====
        const API_BASE = 'http://127.0.0.1:9999';
        let currentSessionId = generateSessionId();
        let currentVideoId = null;
        let isWaitingResponse = false;

        // ===== 缓存同步功能 =====
        async function syncAICache() {
            try {
                console.log('[CACHE_SYNC] 开始同步AI缓存...');
                const response = await fetch(`${API_BASE}/ai/cache/sync`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    console.log('[CACHE_SYNC] 同步完成:', result);
                    
                    if (result.removed_count > 0) {
                        console.log(`[CACHE_SYNC] 已清理 ${result.removed_count} 个过期视频缓存`);
                        // 可选：显示通知
                        // showNotification(`已清理 ${result.removed_count} 个过期缓存`, 'info');
                    }
                    
                    return result;
                } else {
                    console.warn('[CACHE_SYNC] 同步失败:', response.status);
                    return null;
                }
            } catch (error) {
                console.error('[CACHE_SYNC] 同步出错:', error);
                return null;
            }
        }

        async function getCacheStats() {
            try {
                const response = await fetch(`${API_BASE}/ai/cache/stats`);
                if (response.ok) {
                    const stats = await response.json();
                    console.log('[CACHE_STATS]', stats);
                    return stats;
                }
            } catch (error) {
                console.error('[CACHE_STATS] 获取失败:', error);
            }
            return null;
        }

        // ===== 幽灵数据清理 =====
        async function fetchGhostStats() {
            try {
                const res = await fetch(`${API_BASE}/ai/ghosts/stats`);
                if (!res.ok) return null;
                const data = await res.json();
                // 更新徽标
                const badge = document.getElementById('ghost-count-badge');
                if (badge) {
                    const total = data.total_ghosts || 0;
                    if (total > 0) {
                        badge.textContent = total > 99 ? '99+' : total;
                        badge.style.display = 'block';
                    } else {
                        badge.style.display = 'none';
                    }
                }
                return data;
            } catch (e) {
                return null;
            }
        }

        async function cleanGhostData(purge = false) {
            const btn = document.getElementById('ghost-clean-btn');
            const originalHTML = btn.innerHTML;

            // 先查询幽灵统计
            const stats = await fetchGhostStats();
            const total = stats ? (stats.total_ghosts || 0) : 0;

            if (total === 0) {
                // 无幽灵数据
                btn.style.background = 'rgba(0,255,136,0.1)';
                btn.style.borderColor = 'rgba(0,255,136,0.3)';
                btn.style.color = '#00ff88';
                btn.innerHTML = '<i class="fas fa-check-circle"></i> 无幽灵数据';
                setTimeout(() => {
                    btn.style.background = '';
                    btn.style.borderColor = '';
                    btn.style.color = '';
                    btn.innerHTML = originalHTML;
                }, 2500);
                return;
            }

            // 确认是否永久删除
            if (!purge && total > 0) {
                const doDelete = confirm(
                    `发现 ${total} 条幽灵数据：\n` +
                    `  • 幽灵视频缓存: ${stats.ghost_video_caches} 条\n` +
                    `  • 幽灵对话消息: ${stats.ghost_chat_messages} 条\n` +
                    `  • 内存孤立缓存: ${stats.memory_orphan_caches} 条\n\n` +
                    `点击"确定"将永久删除这些幽灵数据，\n点击"取消"仅标记（不删除）。`
                );
                purge = doDelete;
            }

            // 执行清理
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 清理中...';

            try {
                const res = await fetch(`${API_BASE}/ai/ghosts/clean?purge=${purge}`, {
                    method: 'POST',
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const result = await res.json();

                const removed = result.total_removed || 0;
                const action  = purge ? '永久删除' : '已标记';
                btn.style.background = 'rgba(0,255,136,0.1)';
                btn.style.borderColor = 'rgba(0,255,136,0.3)';
                btn.style.color = '#00ff88';
                btn.innerHTML = `<i class="fas fa-check-circle"></i> ${action} ${removed} 条`;

                // 清除徽标
                const badge = document.getElementById('ghost-count-badge');
                if (badge) badge.style.display = 'none';

                console.log('[GHOST_CLEAN] 清理完成:', result);

                // 若有删除则刷新视频列表
                if (removed > 0) {
                    setTimeout(loadVideos, 800);
                }
            } catch (err) {
                btn.style.color = '#ff6b6b';
                btn.innerHTML = '<i class="fas fa-exclamation-circle"></i> 清理失败';
                console.error('[GHOST_CLEAN] 出错:', err);
            } finally {
                setTimeout(() => {
                    btn.disabled = false;
                    btn.style.background = '';
                    btn.style.borderColor = '';
                    btn.style.color = '';
                    btn.innerHTML = originalHTML;
                }, 3000);
            }
        }

        // ===== 初始化 =====
        window.onload = async () => {
            console.log('[INIT] 开始初始化AI聊天页面...');
            
            // 初始化视频选择框为未选中状态
            const select = document.getElementById('video-select');
            if (select) {
                select.className = 'not-selected';
            }
            
            // 🔄 步骤1: 自动同步AI缓存（清理已删除视频的缓存）
            console.log('[INIT] 步骤1: 同步AI缓存...');
            await syncAICache();
            
            // 步骤2: 加载视频列表（后端会再次确认缓存同步）
            console.log('[INIT] 步骤2: 加载视频列表...');
            await loadVideos();

            // 步骤3: 检查 URL 参数，自动选中指定视频
            const urlParams = new URLSearchParams(window.location.search);
            const preselectedVid = urlParams.get('vid');
            if (preselectedVid) {
                const sel = document.getElementById('video-select');
                if (sel) {
                    sel.value = preselectedVid;
                    // 若视频不在当前列表（可能因 owner 过滤导致旧数据缺失），尝试无过滤重新加载
                    if (sel.value !== preselectedVid) {
                        console.log('[INIT] 目标视频不在过滤列表中，尝试全量加载...');
                        await loadVideos(true); // true = 忽略 owner 过滤
                        sel.value = preselectedVid;
                    }
                    if (sel.value === preselectedVid) {
                        sel.className = 'selected';
                        currentVideoId = preselectedVid;
                        console.log('[INIT] 自动选中历史视频:', preselectedVid);
                        await analyzeVideoForAI(preselectedVid);
                        sel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        sel.style.boxShadow = '0 0 0 3px rgba(0,255,136,0.5)';
                        setTimeout(() => { sel.style.boxShadow = ''; }, 2000);
                    } else {
                        console.warn('[INIT] 视频ID不在列表中:', preselectedVid);
                    }
                }
            }
            
            // 步骤4: 加载性能指标
            console.log('[INIT] 步骤4: 加载性能指标...');
            await loadMetrics();
            
            // 步骤5: 启动定时任务
            console.log('[INIT] 步骤5: 启动定时任务...');
            setInterval(loadMetrics, 5000); // 每5秒更新性能指标
            setInterval(syncAICache, 5 * 60 * 1000); // 每5分钟同步缓存

            console.log('[INIT] ✅ 初始化完成！');
        };

        // ===== 会话管理 =====
        function generateSessionId() {
            return `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }

        function createNewSession() {
            currentSessionId = generateSessionId();
            document.getElementById('messages').innerHTML = '';
            addMessage('assistant', '新对话已创建，请继续提问！', {});
        }

        // ===== 视频加载 =====
        async function clearCacheAndReload() {
            console.log('[INFO] 清除缓存并重新加载...');
            
            // 显示提示
            const select = document.getElementById('video-select');
            select.innerHTML = '<option value="">正在清除缓存...</option>';
            select.className = 'not-selected';
            
            try {
                // 1. 清除 Service Worker 缓存
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                    console.log('[INFO] Service Worker 缓存已清除');
                }
                
                // 2. 清除 localStorage 和 sessionStorage
                localStorage.clear();
                sessionStorage.clear();
                console.log('[INFO] 本地存储已清除');
                
                // 3. 触发后端缓存同步（清理已删除视频的AI缓存）
                const syncResponse = await fetch(`${API_BASE}/ai/cache/sync`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (syncResponse.ok) {
                    const result = await syncResponse.json();
                    console.log('[INFO] 后端缓存同步完成:', result);
                } else {
                    console.warn('[WARN] 后端缓存同步失败，继续刷新页面');
                }
                
                // 4. 强制从服务器重新加载页面（绕过浏览器缓存）
                console.log('[INFO] 即将重新加载页面...');
                setTimeout(() => {
                    window.location.href = window.location.href + '?_nocache=' + Date.now();
                }, 300);
                
            } catch (error) {
                console.error('[ERROR] 清除缓存失败:', error);
                alert('清除缓存失败，请手动刷新页面 (Ctrl+F5)');
            }
        }
        
        async function loadVideos(ignoreOwner = false) {
            try {
                console.log('[INFO] 开始加载视频列表...');
                const select = document.getElementById('video-select');
                select.innerHTML = '<option value="">正在加载视频列表...</option>';
                select.className = 'not-selected'; // 初始状态为未选中
                
                // 附带当前登录用户名，只拉取该用户的视频（ignoreOwner=true 时返回全量，用于历史记录兼容）
                const authRaw = localStorage.getItem('auth_user');
                const authUser = authRaw ? JSON.parse(authRaw) : null;
                const ownerParam = (!ignoreOwner && authUser) ? `&owner=${encodeURIComponent(authUser.username)}` : '';

                // 从后端 API 获取已分析的视频列表（添加时间戳防止缓存）
                const timestamp = new Date().getTime();
                const response = await fetch(`${API_BASE}/api/videos?_t=${timestamp}${ownerParam}`, {
                    cache: 'no-store',  // 禁用缓存
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                
                console.log('[INFO] API 响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('[INFO] API 返回数据:', data);
                
                // 清空下拉框
                select.innerHTML = '<option value="">⚠️ 请选择视频开始对话...</option>';
                select.className = 'not-selected'; // 未选中状态
                
                if (data.status === 'success' && data.videos && data.videos.length > 0) {
                    // 添加真实的视频选项，使用智能命名
                    data.videos.forEach((video, index) => {
                        const option = document.createElement('option');
                        option.value = video.id;
                        
                        // 智能命名：日期+时间 格式
                        let displayName = video.name;
                        
                        if (video.analyzed_at) {
                            // 解析 ISO 时间戳
                            const date = new Date(video.analyzed_at);
                            
                            // 格式化为 "2026-01-26 11:24:56" 或更友好的格式
                            const year = date.getFullYear();
                            const month = String(date.getMonth() + 1).padStart(2, '0');
                            const day = String(date.getDate()).padStart(2, '0');
                            const hours = String(date.getHours()).padStart(2, '0');
                            const minutes = String(date.getMinutes()).padStart(2, '0');
                            const seconds = String(date.getSeconds()).padStart(2, '0');
                            
                            // 优先显示：日期+时间
                            displayName = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                            
                            // 如果有原始文件名，追加到括号中
                            if (video.name && !video.name.startsWith('视频_')) {
                                displayName += ` (${video.name})`;
                            }
                        }
                        
                        option.textContent = displayName;
                        select.appendChild(option);
                        console.log(`[INFO] 添加视频 #${index + 1}: ${displayName} (ID: ${video.id.substring(0, 8)}...)`);
                    });
                    
                    console.log(`[OK] 成功加载 ${data.videos.length} 个已分析的视频`);
                } else {
                    // 没有已分析的视频
                    select.innerHTML = '<option value="">暂无已分析的视频</option>';
                    select.className = 'not-selected';
                    console.log('[WARNING] 没有找到已分析的视频');
                    console.log('[HINT] 请先在主页上传视频并完成分析');
                }

                select.onchange = async (e) => {
                    currentVideoId = e.target.value;
                    console.log('[INFO] 选择视频:', currentVideoId);
                    
                    // 切换视觉状态
                    if (currentVideoId) {
                        select.className = 'selected'; // 已选中状态
                        // 触发 AI 分析视频内容
                        await analyzeVideoForAI(currentVideoId);
                    } else {
                        select.className = 'not-selected'; // 未选中状态
                    }
                };
            } catch (error) {
                console.error('[ERROR] 加载视频失败:', error);
                const select = document.getElementById('video-select');
                select.innerHTML = '<option value="">❌ 加载失败，请刷新页面</option>';
                select.className = 'not-selected';
                
                // 显示详细错误信息
                alert(`视频列表加载失败：${error.message}\n\n请检查：\n1. 后端服务是否启动 (http://127.0.0.1:9999)\n2. 浏览器控制台是否有跨域错误\n3. 网络连接是否正常`);
            }
        }

        async function analyzeVideoForAI(videoId) {
            try {
                console.log('[INFO] 触发 AI 语义分析:', videoId);
                const response = await fetch(`${API_BASE}/ai/analyze-video?video_id=${videoId}`, {
                    method: 'POST'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const playerCount = data.semantic_info?.players?.length || 0;
                    console.log('[OK] AI 语义分析完成，球员数量:', playerCount);
                    addMessage('assistant', `✅ 已加载视频分析数据，识别到 ${playerCount} 名球员。现在可以开始提问了！`, {});
                } else {
                    console.warn('[WARNING] AI 语义分析失败，状态码:', response.status);
                    addMessage('assistant', '⚠️ 视频数据加载失败，但您仍可以提问通用问题。', {});
                }
            } catch (error) {
                console.error('[ERROR] AI 分析失败:', error);
                addMessage('assistant', '⚠️ 视频数据加载失败，但您仍可以提问通用问题。', {});
            }
        }

        // ===== 消息发送 =====
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message || isWaitingResponse) return;
            
            if (!currentVideoId) {
                alert('请先选择一个视频！');
                return;
            }

            // 显示用户消息
            addMessage('user', message, {});
            input.value = '';
            
            // 显示加载动画
            isWaitingResponse = true;
            document.getElementById('send-btn').disabled = true;
            addTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/ai/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: currentSessionId,
                        video_id: currentVideoId,
                        stream: false
                    })
                });

                removeTypingIndicator();

                if (response.ok) {
                    const data = await response.json();
                    addMessage('assistant', data.answer, {
                        response_time: data.response_time,
                        tokens: data.tokens_used,
                        confidence: data.confidence,
                        from_cache: data.from_cache
                    });
                } else {
                    const error = await response.json();
                    addMessage('assistant', `❌ 错误: ${error.detail}`, {});
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `❌ 网络错误: ${error.message}`, {});
            } finally {
                isWaitingResponse = false;
                document.getElementById('send-btn').disabled = false;
            }
        }

        function askQuestion(question) {
            document.getElementById('user-input').value = question;
            sendMessage();
        }

        function askQuickQuestion(btn, question) {
            // 点击动效
            btn.style.transform = 'scale(0.96)';
            btn.style.borderColor = 'var(--primary)';
            setTimeout(() => {
                btn.style.transform = '';
                btn.style.borderColor = '';
            }, 200);
            document.getElementById('user-input').value = question;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                sendMessage();
            }
        }

        // ===== 消息显示 =====
        function addMessage(role, content, meta = {}) {
            const messagesContainer = document.getElementById('messages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // 支持 Markdown 格式（简单实现）
            const formattedContent = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            contentDiv.innerHTML = formattedContent;
            
            // 添加元信息
            if (Object.keys(meta).length > 0) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                
                if (meta.response_time) {
                    metaDiv.innerHTML += `<span><i class="fas fa-clock"></i> ${meta.response_time}s</span>`;
                }
                if (meta.tokens) {
                    metaDiv.innerHTML += `<span><i class="fas fa-coins"></i> ${meta.tokens} tokens</span>`;
                }
                if (meta.confidence) {
                    metaDiv.innerHTML += `<span><i class="fas fa-check-circle"></i> ${(meta.confidence * 100).toFixed(0)}%</span>`;
                }
                if (meta.from_cache) {
                    metaDiv.innerHTML += `<span><i class="fas fa-database"></i> 缓存</span>`;
                }
                
                contentDiv.appendChild(metaDiv);
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            
            // 滚动到底部
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const messagesContainer = document.getElementById('messages');
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typing-indicator';
            indicator.innerHTML = `
                <div class="message-avatar"><i class="fas fa-robot"></i></div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // ===== 性能指标 =====
        async function loadMetrics() {
            try {
                const response = await fetch(`${API_BASE}/ai/metrics`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'operational') {
                        const metrics = data.metrics;
                        document.getElementById('metric-speed').textContent = 
                            `${metrics.avg_response_time.toFixed(2)}s`;
                        document.getElementById('metric-success').textContent = 
                            `${(metrics.success_rate * 100).toFixed(0)}%`;
                        document.getElementById('metric-sessions').textContent = 
                            metrics.active_sessions;
                    }
                }
            } catch (error) {
                console.error('加载指标失败:', error);
            }
        }
    </script>
</body>
</html>
